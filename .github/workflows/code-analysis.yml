name: Static Code Analysis
on: [push]

jobs:
  code-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-24.04
    
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Static Code Analysis
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/.devcontainer.json
          imageName: ghcr.io/${{ github.repository_owner }}/repico_devcontainer
          cacheFrom: ghcr.io/${{ github.repository_owner }}/repico_devcontainer
          runCmd: |
            cd /workspaces/1541-rePico
            
            # Install analysis tools
            sudo apt-get update && sudo apt-get install -y cppcheck clang-tidy
            
            # Run Cppcheck
            cppcheck --version
            cppcheck --enable=all --suppress=missingIncludeSystem \
                     --output-file=cppcheck-report.xml \
                     --xml --xml-version=2 \
                     firmware/src firmware/include || true
            
            # Generate detailed HTML report from XML
            python3 tools/generate_report.py cppcheck-report.xml cppcheck-report.html
            
            # Run clang-tidy on C files
            echo "Running clang-tidy analysis..."
            mkdir -p build-analysis
            cd build-analysis
            cmake -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_EXPORT_COMPILE_COMMANDS=TRUE \
                  -S ../firmware -B . -G Ninja > /dev/null 2>&1 || true
            cd ..
            
            find firmware/src firmware/include -name "*.c" -type f > /tmp/c_files.txt
            if [ -f build-analysis/compile_commands.json ]; then
              clang-tidy -p build-analysis $(cat /tmp/c_files.txt) 2>&1 | tee clang-tidy-report.txt || true
            else
              clang-tidy $(cat /tmp/c_files.txt) 2>&1 | tee clang-tidy-report.txt || true
            fi
            
            # Generate summary
            {
              echo "## 📊 Statische Code-Analyse"
              echo ""
              echo "### Übersicht"
              echo ""
              echo "#### Cppcheck"
              if [ -f cppcheck-report.xml ]; then
                ERROR_COUNT=$(grep -c '<error' cppcheck-report.xml 2>/dev/null || echo 0)
                if [ "$ERROR_COUNT" -gt 0 ] 2>/dev/null; then
                  ERRORS=$(grep -c 'severity="error"' cppcheck-report.xml 2>/dev/null || echo 0)
                  WARNINGS=$(grep -c 'severity="warning"' cppcheck-report.xml 2>/dev/null || echo 0)
                  STYLE=$(grep -c 'severity="style"' cppcheck-report.xml 2>/dev/null || echo 0)
                  echo "❌ Gesamt: $ERROR_COUNT Probleme"
                  if [ "$ERRORS" -gt 0 ] 2>/dev/null; then echo "  - Errors: $ERRORS"; fi
                  if [ "$WARNINGS" -gt 0 ] 2>/dev/null; then echo "  - Warnings: $WARNINGS"; fi
                  if [ "$STYLE" -gt 0 ] 2>/dev/null; then echo "  - Style issues: $STYLE"; fi
                else
                  echo "✅ Keine Probleme gefunden"
                fi
              fi
              echo ""
              echo "#### clang-tidy"
              if [ -f clang-tidy-report.txt ]; then
                CLANG_ISSUES=$(grep -c "warning:" clang-tidy-report.txt 2>/dev/null || echo 0)
                if [ "$CLANG_ISSUES" -gt 0 ] 2>/dev/null; then
                  echo "⚠️ $CLANG_ISSUES Warnungen gefunden"
                else
                  echo "✅ Keine Probleme gefunden"
                fi
              fi
              echo ""
              echo "### Reports"
              echo "📊 **Detaillierte HTML-Tabelle**: cppcheck-report.html (File, Line, Column, Severity, ID, Message)"
              echo " **XML Report**: cppcheck-report.xml"
              echo ""
              echo "### Analysierte Verzeichnisse"
              echo "- firmware/src"
              echo "- firmware/include"
              echo ""
              echo "### Tool"
              echo "- Cppcheck (C/C++ Analyse)"
              echo "- clang-tidy (LLVM Analyse)"
              echo ""
              echo "---"
              echo ""
              echo "## 🔍 Detaillierte Fehlerliste"
              if [ -f cppcheck-report.xml ]; then
                ERROR_COUNT=$(grep -c '<error' cppcheck-report.xml 2>/dev/null || echo 0)
                if [ "$ERROR_COUNT" -gt 0 ] 2>/dev/null; then
                  echo ""
                  echo "### Cppcheck Fehlerdetails"
                  echo ""
                  python3 tools/generate_report.py --markdown cppcheck-report.xml
                fi
              fi
            } >> $GITHUB_STEP_SUMMARY

      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-analysis-reports
          path: |
            cppcheck-report.xml
            cppcheck-report.html
            clang-tidy-report.txt
          retention-days: 30
