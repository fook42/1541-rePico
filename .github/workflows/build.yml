name: Build
on: [push]

jobs:  
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:    

      - name: Checkout code
        uses: actions/checkout@v5

      - name: login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create devcontainer      
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository_owner }}/rePico_devcontainer:latest
          cacheFrom: ghcr.io/${{ github.repository_owner }}/rePico_devcontainer:latest
          push: always

      - name: Build rePico
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository_owner }}/rePico_devcontainer:latest
          runCmd: |
            cd /workspaces/1541-rePico
            mkdir -p build
            cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release
            cmake --build . --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: rePico-binaries 
          path: |
            build/1541-rePico.uf2
            build/1541-rePico.elf
